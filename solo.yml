name: mein-moers
icon: null
processes:
  '[SPIN] npm dev':
    command: spin run node npm run dev
    working_dir: null
    auto_start: true
    auto_restart: false
    restart_when_changed: []
    env: {}
  Docker Compose:
    command: COMPOSE_FILE=docker-compose.yml:docker-compose.dev.yml docker compose up
    working_dir: null
    auto_start: true
    auto_restart: false
    restart_when_changed: []
    env: {}
  Pail:
    command: php artisan pail
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
